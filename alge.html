<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
:root{
  --void:#EFF4F8; --paper:#1C2E3E; --dim:#5C7488;
  --steel:#2D628C; --steel2:#244F6E;
  --red:#E60000; --hair:rgba(28,46,62,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overscroll-behavior:none;}
body{background:linear-gradient(180deg,#F2F6FA 0%,#DDE7F0 48%,#C2D3E1 100%);color:var(--paper);
  font-family:'Space Mono','SF Mono',ui-monospace,monospace;
  overflow:hidden;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
canvas{display:block;width:100%;height:100%;position:fixed;inset:0;cursor:grab;touch-action:none;}
canvas:active{cursor:grabbing;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at center,transparent 52%,rgba(25,50,75,.07) 100%);}

.hud{position:fixed;pointer-events:none;z-index:10;}
.topleft{top:0;left:0;padding:18px 22px;}
.brand{display:flex;align-items:center;gap:9px;font-family:'Bebas Neue','Arial Narrow',sans-serif;font-size:22px;letter-spacing:.5px;}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 12px 2px rgba(230,0,0,.35);}
.sub{margin-top:5px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}

.topright{top:0;right:0;padding:18px 22px;text-align:right;pointer-events:auto;}
.count{font-size:10px;color:var(--dim);letter-spacing:.05em;display:flex;align-items:center;gap:7px;justify-content:flex-end;}
.count b{color:var(--paper);font-weight:700;font-variant-numeric:tabular-nums;}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,0,0,.5)}70%{box-shadow:0 0 0 6px rgba(230,0,0,0)}100%{box-shadow:0 0 0 0 rgba(230,0,0,0)}}
.demo-badge{display:none;margin-top:7px;font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);}
.demo-badge.on{display:block;}

.botleft{bottom:0;left:0;padding:18px 22px;}
.legend{display:flex;flex-direction:column;gap:4px;pointer-events:auto;}
.lg{display:flex;align-items:center;gap:7px;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--dim);cursor:pointer;transition:color .15s ease;}
.lg:hover,.lg.on{color:var(--paper);}
.lg .sw{width:7px;height:7px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);}
@media(max-width:640px){.botleft{display:none;}}

#hook{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;pointer-events:none;text-align:center;padding:0 24px;}
#hook .hk-dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 14px 3px rgba(230,0,0,.3);
  opacity:0;animation:hookIn 1.4s ease .6s forwards;}
#hook .hk-q{max-width:22ch;font-size:clamp(1.15rem,2.6vw,1.6rem);line-height:1.7;color:var(--paper);
  opacity:0;animation:hookIn 1.8s ease 1.2s forwards;}
@keyframes hookIn{to{opacity:1}}
#hook.gone{transition:opacity .9s ease;opacity:0;}
.hud,.fab{transition:opacity 1.2s ease;}
body:not(.arrived) .hud,body:not(.arrived) .fab{opacity:0;pointer-events:none;}

#leader{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:19;}
#leaderPath{opacity:0;transition:opacity .15s ease;}
#leaderHalo{opacity:0;transition:opacity .15s ease;}
#leaderDot{opacity:0;transition:opacity .15s ease;}

#tip{position:fixed;pointer-events:none;z-index:20;max-width:250px;padding:10px 13px;
  background:rgba(255,255,255,.97);border:1px solid var(--hair);border-radius:9px;
  box-shadow:0 10px 28px rgba(0,0,0,.14);opacity:0;transition:opacity .15s ease;}
#tip .ts{display:none;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
#tip.missed .ts{display:block;}
#tip .tc{font-size:8px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
#tip .tq{font-size:11.5px;line-height:1.4;color:var(--paper);}
#tip .tm{margin-top:5px;font-size:8px;color:var(--dim);}

.fab{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:15;
  font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1.2px;
  background:var(--steel);color:#FFFFFF;border:none;border-radius:999px;
  padding:13px 28px;cursor:pointer;box-shadow:0 8px 30px rgba(45,98,140,.3);
  transition:transform .18s cubic-bezier(.2,.9,.25,1),background .2s,box-shadow .2s;}
.fab:hover{background:var(--steel2);transform:translateX(-50%) scale(1.045);box-shadow:0 10px 34px rgba(45,98,140,.4);}
.fab:active{transform:translateX(-50%) scale(.97);}

.scrim{position:fixed;inset:0;z-index:50;background:rgba(222,234,243,.45);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;}
.scrim.open{display:block;}
.sheet{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;
  width:min(440px,90vw);max-height:82vh;background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.1);
  border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.16);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  display:none;flex-direction:column;overflow:hidden;}
.sheet.open{display:flex;animation:panelIn .22s cubic-bezier(.2,.9,.25,1);}
@keyframes panelIn{from{opacity:0;transform:translate(-50%,-50%) scale(.95)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@media(max-width:640px){.sheet{width:92vw;}}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid rgba(0,0,0,.06);}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.5px;}
.x{background:none;border:none;color:var(--dim);font-size:1.4rem;cursor:pointer;line-height:1;}
.x:hover{color:var(--paper);}
.sh-body{padding:16px 18px;overflow-y:auto;flex:1;}
.sh-body input[type=text],.sh-body textarea{width:100%;background:rgba(0,0,0,.03);color:var(--paper);
  border:1px solid rgba(0,0,0,.1);border-radius:9px;padding:11px 13px;font-family:inherit;font-size:.92rem;
  resize:none;transition:border-color .2s;}
.sh-body input:focus,.sh-body textarea:focus{outline:none;border-color:rgba(230,0,0,.4);}
.sh-body textarea{margin-top:9px;min-height:88px;}
.nrow{display:flex;gap:8px;align-items:stretch;}
.nrow input{flex:1;}
.nrow input:disabled{opacity:.35;}
.anon{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;font-family:inherit;
  border:1px solid rgba(0,0,0,.12);background:none;color:var(--dim);border-radius:9px;
  padding:0 14px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.anon.on{background:var(--paper);border-color:var(--paper);color:#FFFFFF;}
.anonline{display:flex;align-items:center;gap:6px;font-size:.62rem;color:var(--dim);cursor:pointer;user-select:none;}
.anonline input{accent-color:#1D1D1F;}
.cats{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.chip{font-size:.6rem;letter-spacing:1px;text-transform:uppercase;border:1px solid rgba(0,0,0,.12);background:none;
  color:var(--dim);border-radius:999px;padding:6px 12px;cursor:pointer;transition:all .15s;font-family:inherit;}
.chip.on{color:#1D1D1F;font-weight:700;border-color:transparent;}
.crow{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
.cnt{font-size:.6rem;color:var(--dim);}
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:1rem;background:var(--steel);
  color:#FFFFFF;border:none;border-radius:9px;padding:9px 22px;cursor:pointer;
  transition:transform .12s,background .2s;align-self:flex-end;}
.btn:hover{background:var(--steel2);}.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.qcat{font-size:.56rem;letter-spacing:1.4px;text-transform:uppercase;}
.qbody{font-size:1.08rem;line-height:1.5;margin:9px 0 6px;white-space:pre-wrap;word-wrap:break-word;}
.qmeta{font-size:.58rem;color:var(--dim);}

.p-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:15px;}
@media(max-width:420px){.p-actions{grid-template-columns:repeat(2,1fr);}}
.p-btn{background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.08);border-radius:12px;
  padding:11px 4px;text-align:center;cursor:pointer;user-select:none;
  transition:all .18s cubic-bezier(.2,.8,.2,1);}
.p-btn:hover{background:rgba(230,0,0,.06);border-color:rgba(230,0,0,.25);transform:translateY(-1px);}
.p-btn.active{background:var(--paper);border-color:var(--paper);}
.p-btn.active .p-icon,.p-btn.active .pb-label{color:#FFFFFF;}
.p-btn.active .pb-count{color:rgba(255,255,255,.6);}
.p-icon{font-size:16px;margin-bottom:4px;}
.pb-label{font-size:8px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;}
.pb-count{font-size:8px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums;}

.p-input{display:none;flex-direction:column;gap:8px;margin-top:12px;}
.p-input.open{display:flex;}
.p-input input[type=text]{background:rgba(0,0,0,.03);color:var(--paper);border:1px solid rgba(0,0,0,.1);
  border-radius:9px;padding:10px 12px;font-family:inherit;font-size:.88rem;}
.p-input input[type=text]:focus{outline:none;border-color:rgba(230,0,0,.4);}

.replies{margin-top:16px;border-top:1px solid rgba(0,0,0,.08);padding-top:5px;}
.r{padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06);}
.rmeta{font-size:.56rem;color:var(--dim);margin-bottom:3px;letter-spacing:.03em;}
.rmeta b{color:var(--paper);}
.rmeta .rk{color:var(--red);font-weight:700;letter-spacing:.1em;}
.rbody{font-size:.88rem;line-height:1.5;color:#3c3c3c;white-space:pre-wrap;word-wrap:break-word;}
</style>
</head>

<canvas id="c"></canvas>

<div class="hud topleft">
  <a href="/" style="pointer-events:auto;text-decoration:none;color:inherit;display:inline-block">

<!-- question sheet -->
<div class="sheet" id="qsheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
'use strict';
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const tip=document.getElementById('tip');
const leaderPath=document.getElementById('leaderPath'), leaderDot=document.getElementById('leaderDot'),
      leaderHalo=document.getElementById('leaderHalo');
const $=s=>document.querySelector(s);
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const ago=ts=>{const s=Math.floor((Date.now()-new Date(ts))/1e3);if(s<60)return'just now';
  const m=s/60|0;if(m<60)return m+'m ago';const h=m/60|0;return h<24?h+'h ago':(h/24|0)+'d ago'};

/* ─── demo mode: ?n=100 | 1000 | 100000 — synthetic local data, Supabase untouched ─── */
const DEMO_N=Math.min(parseInt(new URLSearchParams(location.search).get('n'))||0,150000);
const IS_DEMO=DEMO_N>0;
const IS_STATIC=IS_DEMO&&DEMO_N>220;     // beyond this, pairwise physics is replaced by a fixed sphere lattice
const IS_MASSIVE=IS_DEMO&&DEMO_N>2500;   // beyond this, point-cloud rendering (no z-sort, culled back hemisphere)
if(IS_DEMO)document.getElementById('demoBadge').classList.add('on');

/* ─── data layer — same live tables as feed.html, replies carry a real kind ─── */
const SUPABASE_URL='https://fliheqjbwmcoggajovln.supabase.co';
const SUPABASE_KEY='sb_publishable_qaGLnY9bUZ3nhveVw-64xg_kDuJLfHt';
const sb=IS_DEMO?null:supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const db=IS_DEMO?null:{
  listQuestions:()=>sb.from('questions').select('*').order('created_at',{ascending:false}).limit(300),
  listReplies:()=>sb.from('replies').select('*').order('created_at',{ascending:true}),
  addQuestion:(name,body,category,lat,lon)=>sb.from('questions').insert({name,body,category,lat,lon}).select().single(),
  addReply:(question_id,name,body,kind)=>sb.from('replies').insert({question_id,name,body,kind}).select().single(),
  onQuestion:cb=>sb.channel('q_alge').on('postgres_changes',{event:'INSERT',schema:'public',table:'questions'},p=>cb(p.new)).subscribe(),
  onReply:cb=>sb.channel('r_alge').on('postgres_changes',{event:'INSERT',schema:'public',table:'replies'},p=>cb(p.new)).subscribe(),
};

/* ─── same 6 categories + colors as feed.html ─── */
const CATS={
  'ai & future':    {col:[155,135,255]},
  'build & startup':{col:[232,163,61]},
  'study & gyaan':  {col:[200,212,0]},
  'life':           {col:[128,126,120]},
  'meet people':    {col:[63,167,150]},
  'random':         {col:[220,80,70]},
};
const CATKEYS=Object.keys(CATS);

const KIND_META={
  answer:  {icon:'&#9998;', label:'Answer',  placeholder:'Write your answer…'},
  debate:  {icon:'&#9876;', label:'Debate',  placeholder:'State your counter-position…'},
  discuss: {icon:'&#9993;', label:'Continue', placeholder:'Continue the conversation…'},
  meet:    {icon:'&#9734;', label:'Meet',    placeholder:'Say why you want to meet… (optional)'},
};
const KIND_ORDER=['answer','debate','discuss','meet'];
let activeKind=null;

/* ─── synthetic cohort question bank (demo only) ─── */
const Q_BANK={
'ai & future':["Prof, will our degree still matter when AI can do the coursework?","What should we learn now that AI can't take from us?","Which AI claim from lectures aged the worst?","If you restarted research today, would you pick AI?","What's the most overhyped AI idea this semester?","How do we stay employable in an AI-first decade?","Which human skill compounds fastest against AI?","What would you automate first about this course?"],
'build & startup':["Why did your favorite student startup actually fail?","What's the real reason campus ideas die after demo day?","Would you invest in a student team? What convinces you?","What did the syllabus never teach about building?","Which classmate's idea deserved funding but got ignored?","How do we find a co-founder before the cohort scatters?","What's a business hiding inside this campus?","When is dropping out actually rational?"],
'study & gyaan':["What questions are left to ask our prof?","Why does school teach what to learn, never how?","Which topic did we memorize but never understand?","What would you remove from the curriculum tomorrow?","What's the one lecture you wish you could re-attend?","Which book changed how you think, not what you know?","What did the toppers understand that we didn't?","What's worth learning that has no exam?"],
'life':["What do you wish you'd asked before the cohort ends?","Which habit from hostel life should we keep forever?","What are we all pretending is fine when it isn't?","What will we regret not doing this year?","Who did you never thank properly here?","What does everyone misunderstand about you?","Which fear did campus quietly cure?","What's a conversation you keep postponing?"],
'meet people':["Who here is building something and needs hands?","Which senior should every junior actually meet?","Who do you know that thinks completely unlike you?","Who's quietly brilliant and never speaks in class?","Which prof is worth a chai beyond the classroom?","Who wants to co-work sundays after we graduate?","Who did you meet once and never follow up with?","Who's solving the same problem as you, unaware?"],
'random':["What's the best question you've ever been asked?","What would you do with a free year, no judgment?","Which rule here exists for no reason?","What's your unpopular opinion about this campus?","What's the weirdest thing that taught you the most?","If the campus had a black box, what would it record?","What tiny thing here will you miss the most?","What question would you float anonymously right now?"]};
const NAMES=['Aarav','Ishita','Rohan','Priya','Kabir','Ananya','Dev','Meera','Arjun','Sana','Vikram','Tara','Nikhil','Zoya','Aditya','the .bro team'];
const REPLY_BANK=["Been thinking the same since first year.","Asked my prof this once — the answer surprised me.","This deserves a whole session, not a comment.","Strong disagree — the premise is off.","Let's take this offline, I have notes.","Someone in the 2024 batch solved exactly this.","I'd flip the question: why do we assume it at all?","Reading group on this, Sunday?","The honest answer is nobody knows yet.","This one kept me up last night too."];
function hi(x){x^=x>>>16;x=Math.imul(x,0x45d9f3b);x^=x>>>16;x=Math.imul(x,0x45d9f3b);x^=x>>>16;return x>>>0;}

/* ─── state ─── */
const S={q:new Map(),replies:new Map(),nodes:new Map(),arr:[],openId:null,cat:'random',filter:null,
  anon:localStorage.getItem('dotbro_anon')==='1',
  geo:(()=>{try{return JSON.parse(localStorage.getItem('dotbro_geo'))}catch(_){return null}})(),
  mine:new Set((()=>{try{return JSON.parse(localStorage.getItem('dotbro_mine'))||[]}catch(_){return []}})())};
function latLonDir(lat,lon){const la=lat*Math.PI/180,lo=lon*Math.PI/180;
  return {x:Math.cos(la)*Math.cos(lo),y:-Math.sin(la),z:Math.cos(la)*Math.sin(lo)};}
function fmtLoc(lat,lon){
  if(lat==null||lon==null)return 'IIT Mandi';
  if(Math.abs(lat-31.78)<1.5&&Math.abs(lon-76.99)<1.5)return 'IIT Mandi';
  return Math.abs(lat).toFixed(1)+'°'+(lat>=0?'N':'S')+' '+Math.abs(lon).toFixed(1)+'°'+(lon>=0?'E':'W');
}
const nodeOf=id=>IS_DEMO?S.arr[id]:S.nodes.get(id);
const qOf=id=>{
  if(!IS_DEMO)return S.q.get(id);
  const n=S.arr[id];return n?{id,name:n.nameStr,body:n.text,category:n.cat,created_at:new Date(n.ts).toISOString()}:null;};
let _rCacheId=null,_rCache=null;
function repliesOf(id){
  if(!IS_DEMO)return S.replies.get(id)||[];
  if(_rCacheId===id)return _rCache;
  const n=S.arr[id];if(!n)return[];
  const out=[];
  for(let i=0;i<n.nr;i++){const hh=hi(n.h+i*97);
    out.push({id:'d'+id+'_'+i,question_id:id,kind:KIND_ORDER[hh%4],name:NAMES[hh%NAMES.length],
      body:REPLY_BANK[hh%REPLY_BANK.length],created_at:new Date(n.ts+(hh%86400000)).toISOString()});}
  _rCacheId=id;_rCache=out;return out;
}
function kindCounts(id){
  const rs=repliesOf(id);const c={answer:0,debate:0,discuss:0,meet:0};
  rs.forEach(r=>{const k=c[r.kind]!==undefined?r.kind:'discuss';c[k]++;});return c;
}

const legendBox=$('#legend');
CATKEYS.forEach(k=>{
  const [r,g,b]=CATS[k].col;
  const el=document.createElement('div'); el.className='lg';
  el.innerHTML=`<span class="sw" style="background:rgb(${r},${g},${b})"></span>${k}`;
  el.onclick=()=>{S.filter=S.filter===k?null:k;
    [...legendBox.children].forEach(c=>c.classList.remove('on'));
    if(S.filter)el.classList.add('on')};
  legendBox.appendChild(el);
});

let W,H,DPR,CX,CY,R,BGGRAD=null;
function computeR(){
  if(IS_MASSIVE)return Math.min(W,H)*0.46;
  if(IS_STATIC)return Math.min(W,H)*0.40;
  const density=Math.min(1,S.arr.length/90);
  return Math.min(W,H)*0.28*(1+density*0.42);
}
function resize(){
  DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  canvas.width=W*DPR; canvas.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2; CY=H*0.48; R=computeR();
  BGGRAD=ctx.createLinearGradient(0,0,0,H);
  BGGRAD.addColorStop(0,'#F2F6FA');BGGRAD.addColorStop(0.48,'#DDE7F0');BGGRAD.addColorStop(1,'#C2D3E1');
  if(!IS_STATIC)for(const p of S.arr)p.targetR=R*ORBIT;
}
addEventListener('resize',resize);

const GOLDEN=Math.PI*(3-Math.sqrt(5));
const ORBIT=1.16; // conversations float on a shell above the surface
const CAT_OFF={};
CATKEYS.forEach((k,i)=>{
  const y=1-(i/5)*2, rad=Math.sqrt(Math.max(0,1-y*y)), th=GOLDEN*i;
  CAT_OFF[k]={x:Math.cos(th)*rad, y, z:Math.sin(th)*rad};
});

function randDir(){ const u=Math.random()*2-1, th=Math.random()*Math.PI*2, s=Math.sqrt(1-u*u);
  return {x:s*Math.cos(th), y:u, z:s*Math.sin(th)}; }

function makeNode(id,text,cat,createdAt,incoming,lat,lon){
  const c=CATS[cat]?cat:'random';
  const base=(lat!=null&&lon!=null)?latLonDir(lat,lon):HOME_DIR;
  const off=CAT_OFF[c];
  let ax=base.x+off.x*0.20,ay=base.y+off.y*0.20,az=base.z+off.z*0.20;
  const al=Math.sqrt(ax*ax+ay*ay+az*az);
  const anchor={x:ax/al,y:ay/al,z:az/al};
  const jitter=randDir();
  const startR=incoming?R*ORBIT*1.04:R*ORBIT*(0.9+Math.random()*0.2);
  const jw=incoming?0.08:0.13;
  let sx=anchor.x+jitter.x*jw,sy=anchor.y+jitter.y*jw,sz=anchor.z+jitter.z*jw;
  const sl=Math.sqrt(sx*sx+sy*sy+sz*sz);sx/=sl;sy/=sl;sz/=sl;
  return {
    id, text, cat:c, col:CATS[c].col, anchor,
    x:sx*startR, y:sy*startR, z:sz*startR,
    vx:0,vy:0,vz:0, fx:0,fy:0,fz:0,
    curR:startR, targetR:R*ORBIT,
    born:performance.now(), createdAt: createdAt||new Date().toISOString(),
    ts:createdAt?new Date(createdAt).getTime():Date.now(),
    px:0,py:0,pz:0,pscale:1, ppx:0,ppy:0, incoming:!!incoming, la:0,
  };
}
function nodeR(n){
  const nr=IS_DEMO?n.nr:(S.replies.get(n.id)||[]).length;
  if(IS_MASSIVE)return 1.4+(nr?0.9:0);
  if(IS_STATIC)return Math.min(2.6+Math.sqrt(nr)*1.2,5);
  const density=Math.min(1,S.arr.length/90);
  const base=4.8-density*1.4;
  return Math.min(base+Math.sqrt(nr)*2.0,12);
}

/* ─── demo generation: category-banded Fibonacci lattice, deterministic ─── */
function generateDemo(N){
  const now=Date.now();
  const weights=[0.18,0.20,0.24,0.14,0.13,0.11];
  const bounds=[];let acc=0;
  weights.forEach(w=>{acc+=w;bounds.push(Math.round(acc*N));});
  let ci=0;
  for(let i=0;i<N;i++){
    while(i>=bounds[ci])ci++;
    const cat=CATKEYS[Math.min(ci,5)], h=hi(i+0x9e37);
    const y=1-(i/(N-1||1))*2, rad=Math.sqrt(Math.max(0,1-y*y)), th=GOLDEN*i;
    const bank=Q_BANK[cat];
    const nr=(h%10<4)?((h>>>4)%4)+((h%100<6)?3:0):0;
    let na=0;for(let j=0;j<nr;j++)if(hi(h+j*97)%4===0)na++;
    const node={
      id:i, cat, col:CATS[cat].col, h,
      dx:Math.cos(th)*rad, dy:y, dz:Math.sin(th)*rad,
      text:bank[h%bank.length], nameStr:NAMES[(h>>>8)%NAMES.length],
      ts:now-(h%(45*86400000)), nr, na,
      px:0,py:0,pz:0,pscale:1, la:0,
    };
    node.createdAt=node.ts;
    S.arr.push(node);
  }
  if(!IS_STATIC){ // small demo: run it through the live physics engine instead
    const staticArr=S.arr;S.arr=[];
    staticArr.forEach(sn=>{
      const n=makeNode(sn.id,sn.text,sn.cat,new Date(sn.ts).toISOString(),false);
      n.h=sn.h;n.nr=sn.nr;n.na=sn.na;n.nameStr=sn.nameStr;
      n.anchor={x:sn.dx,y:sn.dy,z:sn.dz};
      S.arr.push(n);
    });
  }
}

function physics(){
  const nodes=S.arr, n=nodes.length;
  for(let i=0;i<n;i++){const p=nodes[i];p.fx=0;p.fy=0;p.fz=0;}
  const REP=900;
  for(let i=0;i<n;i++){const a=nodes[i];for(let j=i+1;j<n;j++){const b=nodes[j];
    let dx=a.x-b.x,dy=a.y-b.y,dz=a.z-b.z,d2=dx*dx+dy*dy+dz*dz+.01;
    const d=Math.sqrt(d2),f=REP/d2;
    const fx=dx/d*f,fy=dy/d*f,fz=dz/d*f;
    a.fx+=fx;a.fy+=fy;a.fz+=fz;b.fx-=fx;b.fy-=fy;b.fz-=fz;}}
  for(let i=0;i<n;i++){const p=nodes[i];
    const anc=p.anchor;
    p.fx+=(anc.x*R*ORBIT-p.x)*0.012; p.fy+=(anc.y*R*ORBIT-p.y)*0.012; p.fz+=(anc.z*R*ORBIT-p.z)*0.012;
    p.vx=(p.vx+p.fx)*0.86;p.vy=(p.vy+p.fy)*0.86;p.vz=(p.vz+p.fz)*0.86;
    p.x+=p.vx*0.08;p.y+=p.vy*0.08;p.z+=p.vz*0.08;
    if(p.curR>p.targetR+.5)p.curR+=(p.targetR-p.curR)*0.045;
    else{p.curR=p.targetR;p.incoming=false;}
    const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)+1e-6;
    p.x+=(p.x/len*p.curR-p.x)*0.22;p.y+=(p.y/len*p.curR-p.y)*0.22;p.z+=(p.z/len*p.curR-p.z)*0.22;
  }
}

let _cY,_sY,_cX,_sX,_fov;
function beginProjection(){_cY=Math.cos(rotY);_sY=Math.sin(rotY);_cX=Math.cos(rotX);_sX=Math.sin(rotX);_fov=900*zoom;}
function projectXYZ(p,wx,wy,wz){
  const x=wx*_cY-wz*_sY;let z=wx*_sY+wz*_cY;
  const y=wy*_cX-z*_sX;z=wy*_sX+z*_cX;
  const scale=_fov/(_fov+z+R*1.4);
  p.px=CX+x*scale;p.py=CY+y*scale;p.pz=z;p.pscale=scale;
}
function positionAll(now){
  beginProjection();
  if(IS_STATIC){
    const t=now*0.0006;
    for(const p of S.arr){
      const wob=R*ORBIT*(1+0.009*Math.sin(t+(p.h%628)*0.01));
      projectXYZ(p,p.dx*wob,p.dy*wob,p.dz*wob);
    }
  }else{
    for(const p of S.arr)projectXYZ(p,p.x,p.y,p.z);
  }
}

/* ─── spotlight: resurface an old / unanswered question the user likely missed ─── */
let spot=null,spotNextAt=4000;const spotRecent=[];
function pickSpot(now){
  const n=S.arr.length;if(!n)return null;
  let best=null,bestScore=-1;
  const tries=Math.min(n,90);
  for(let i=0;i<tries;i++){
    const p=S.arr[(Math.random()*n)|0];
    if(p.pz>-R*0.2)continue;
    if(S.filter&&S.filter!==p.cat)continue;
    if(spotRecent.includes(p.id))continue;
    const nr=IS_DEMO?p.nr:(S.replies.get(p.id)||[]).length;
    const ageDays=(Date.now()-p.ts)/86400000;
    const score=(nr===0?1.6:0)+Math.min(ageDays/45,1)+Math.random()*0.4;
    if(score>bestScore){bestScore=score;best=p;}
  }
  return best;
}
function updateSpot(now){
  if(hover||dragging){if(hover)spot=null;return;}
  if(spot&&(now>spot.until||spot.node.pz>0))spot=null;
  if(!spot&&now>spotNextAt){
    const node=pickSpot(now);
    if(node){spot={node,until:now+5200,born:now};
      spotRecent.push(node.id);if(spotRecent.length>8)spotRecent.shift();}
    spotNextAt=now+9000;
  }
}

/* ─── ambient labels: the front-most questions read themselves out, softly ─── */
let labelSet=new Set(),labelFrame=0;
function rebuildLabels(){
  const cand=[];
  for(const p of S.arr){
    if(p.pz>-R*0.3)continue;
    if(S.filter&&S.filter!==p.cat)continue;
    cand.push(p);
  }
  cand.sort((a,b)=>a.pz-b.pz);
  const picked=[];
  for(const p of cand){
    if(picked.length>=7)break;
    let ok=true;
    for(const q of picked){if(Math.abs(p.px-q.px)<170&&Math.abs(p.py-q.py)<38){ok=false;break;}}
    if(ok)picked.push(p);
  }
  labelSet=new Set(picked.map(p=>p.id));
}
function drawLabels(){
  for(const p of S.arr){
    const target=labelSet.has(p.id)?1:0;
    if(p.la===0&&target===0)continue;
    p.la+=(target-p.la)*0.05;
    if(p.la<0.02){p.la=0;continue;}
    const depth=1-Math.min(1,Math.max(0,(p.pz+R)/(2*R)));
    let label=p.text.length>44?p.text.slice(0,43)+'…':p.text;
    const rx=p.px-CX,ry=p.py-CY,rl=Math.sqrt(rx*rx+ry*ry)+1e-6;
    const nx=rx/rl,ny=ry/rl;
    ctx.save();
    ctx.globalAlpha=0.62*p.la*Math.max(0.55,depth);
    ctx.font='11px "Space Mono",ui-monospace,monospace';
    ctx.textAlign=nx<-0.25?'right':'left';
    ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=3;ctx.lineJoin='round';
    ctx.strokeText(label,p.px+nx*22,p.py+ny*22);
    ctx.fillStyle='#3A3A3E';
    ctx.fillText(label,p.px+nx*22,p.py+ny*22);
    ctx.restore();
  }
}

/* ─── real Earth: landmasses as a dot lattice, sampled from Natural Earth (110m) ─── */
let LAND=[];
(async function loadEarth(){
  try{
    const topo=await (await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json')).json();
    const land=topojson.feature(topo,topo.objects.land);
    const cv=document.createElement('canvas');cv.width=720;cv.height=360;
    const c2=cv.getContext('2d');c2.fillStyle='#000';
    const geom=land.geometry||land.features[0].geometry;
    const polys=geom.type==='MultiPolygon'?geom.coordinates:[geom.coordinates];
    polys.forEach(rings=>{c2.beginPath();
      rings.forEach(ring=>{ring.forEach((pt,i)=>{const x=(pt[0]+180)*2,y=(90-pt[1])*2;
        i?c2.lineTo(x,y):c2.moveTo(x,y)});c2.closePath();});
      c2.fill('evenodd');});
    const img=c2.getImageData(0,0,720,360).data;
    const isLand=(la,lo)=>{const x=Math.min(719,Math.max(0,Math.round((lo+180)*2))),
      y=Math.min(359,Math.max(0,Math.round((90-la)*2)));return img[(y*720+x)*4+3]>128;};
    const dots=[],N=15000;
    for(let i=0;i<N;i++){const fy=1-(i/(N-1))*2,rad=Math.sqrt(Math.max(0,1-fy*fy)),th=GOLDEN*i;
      const x=Math.cos(th)*rad,z=Math.sin(th)*rad;
      const la=Math.asin(-fy)*180/Math.PI,lo=Math.atan2(z,x)*180/Math.PI;
      if(isLand(la,lo))dots.push({x,y:fy,z,
        t:(la>60||la<-60)?2:(i%4?0:1)});}
    LAND=dots;
  }catch(_){/* offline: abstract globe still works */}
})();

/* lit-sphere shading: fixed key light from upper-left-front */
const LIGHT={x:-0.44,y:-0.53,z:-0.72};

/* photoreal satellite texture (Google-Earth look); dotted land remains the fallback */
let TEX=null;const TW=1024,TH=512;
let texCv=null,texCtx=null,texImg=null,lastRas={y:9e9,x:9e9,s:0};
(async function loadTexture(){
  try{
    const img=new Image();img.crossOrigin='anonymous';
    img.src='https://cdn.jsdelivr.net/gh/mrdoob/three.js@r134/examples/textures/planets/earth_atmos_2048.jpg';
    await img.decode();
    const c=document.createElement('canvas');c.width=TW;c.height=TH;
    const cc=c.getContext('2d');cc.drawImage(img,0,0,TW,TH);
    TEX=cc.getImageData(0,0,TW,TH).data;
  }catch(_){TEX=null;}
})();
function rasterEarth(sil){
  const S=Math.min(520,Math.max(160,Math.round(sil*2)));
  if(!texCv||texCv.width!==S){
    texCv=document.createElement('canvas');texCv.width=texCv.height=S;
    texCtx=texCv.getContext('2d');texImg=texCtx.createImageData(S,S);}
  const d=texImg.data;
  const cYr=Math.cos(rotY),sYr=Math.sin(rotY),cXr=Math.cos(rotX),sXr=Math.sin(rotX);
  const half=S/2;let k=0;
  for(let j=0;j<S;j++){
    const uy=(j-half)/half;
    for(let i=0;i<S;i++,k+=4){
      const ux=(i-half)/half;
      const d2=ux*ux+uy*uy;
      if(d2>1){d[k+3]=0;continue;}
      const uz=-Math.sqrt(1-d2);
      const wy=uy*cXr+uz*sXr;
      const z1=-uy*sXr+uz*cXr;
      const wx=ux*cYr+z1*sYr;
      const wz=-ux*sYr+z1*cYr;
      const lat=Math.asin(Math.max(-1,Math.min(1,-wy)));
      const lon=Math.atan2(wz,wx);
      let u=((lon+Math.PI)/(2*Math.PI)*TW)|0;if(u>=TW)u=TW-1;if(u<0)u=0;
      let v=((Math.PI/2-lat)/Math.PI*TH)|0;if(v>=TH)v=TH-1;if(v<0)v=0;
      const t=(v*TW+u)*4;
      let sh=ux*LIGHT.x+uy*LIGHT.y+uz*LIGHT.z;
      sh=0.4+0.72*Math.max(0,sh);
      d[k]=TEX[t]*sh;d[k+1]=TEX[t+1]*sh;d[k+2]=TEX[t+2]*sh;d[k+3]=255;
    }
  }
  texCtx.putImageData(texImg,0,0);
}

function drawGlobeSkin(){
  const q={};
  const sil=R*(_fov/(_fov+R*1.4));
  let g=ctx.createRadialGradient(CX,CY,sil*0.96,CX,CY,sil*1.07);
  g.addColorStop(0,'rgba(140,185,225,0)');

  g.addColorStop(1,'rgba(140,185,225,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,sil*1.07,0,7);ctx.fill();

  if(TEX){
    const delta=Math.abs(rotY-lastRas.y)+Math.abs(rotX-lastRas.x)+Math.abs(sil-lastRas.s);
    if(delta>0.0008)  {rasterEarth(sil);lastRas={y:rotY,x:rotX,s:sil};}
    ctx.drawImage(texCv,CX-sil,CY-sil,sil*2,sil*2);
    g=ctx.createRadialGradient(CX-sil*0.42,CY-sil*0.48,0,CX-sil*0.42,CY-sil*0.48,sil*0.36);
    g.addColorStop(0,'rgba(255,255,255,0.28)');
    g.addColorStop(1,'rgba(255,255,255,0)');

    ctx.strokeStyle='rgba(40,70,100,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(CX,CY,sil,0,7);ctx.stroke();

  }

  g=ctx.createRadialGradient(CX-sil*0.38,CY-sil*0.42,sil*0.08,CX,CY,sil);
  g.addColorStop(0,'#F4FBFE');
  g.addColorStop(0.5,'#C6DFEF');
  g.addColorStop(1,'#8FB4CE');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,sil,0,7);ctx.fill();
  g=ctx.createRadialGradient(CX-sil*0.5,CY-sil*0.55,sil*0.35,CX-sil*0.5,CY-sil*0.55,sil*1.9);
  g.addColorStop(0,'rgba(25,45,70,0)');
  g.addColorStop(0.6,'rgba(25,45,70,0.05)');
  g.addColorStop(1,'rgba(25,45,70,0.28)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,sil,0,7);ctx.fill();
  g=ctx.createRadialGradient(CX-sil*0.42,CY-sil*0.48,0,CX-sil*0.42,CY-sil*0.48,sil*0.32);
  g.addColorStop(0,'rgba(255,255,255,0.5)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(CX,CY,sil,0,7);ctx.fill();
  ctx.strokeStyle='rgba(60,95,125,0.30)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(CX,CY,sil,0,7);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.30)';ctx.lineWidth=.7;
  const seg=48;
  for(let k=-2;k<=2;k++){const lat=k*0.42,rr=Math.cos(lat)*R,yy=Math.sin(lat)*R;ctx.beginPath();
    for(let s=0;s<=seg;s++){const th=s/seg*Math.PI*2;
      projectXYZ(q,Math.cos(th)*rr,yy,Math.sin(th)*rr);
      if(s===0)ctx.moveTo(q.px,q.py);else ctx.lineTo(q.px,q.py);}ctx.stroke();}
  for(let k=0;k<3;k++){const lon=k*Math.PI/3;ctx.beginPath();
    for(let s=0;s<=seg;s++){const ph=s/seg*Math.PI*2;
      projectXYZ(q,Math.cos(lon)*Math.cos(ph)*R,Math.sin(ph)*R,Math.sin(lon)*Math.cos(ph)*R);
      if(s===0)ctx.moveTo(q.px,q.py);else ctx.lineTo(q.px,q.py);}ctx.stroke();}
  for(const d of LAND){
    projectXYZ(q,d.x*R,d.y*R,d.z*R);
    if(q.pz>0)continue;
    const nx=(q.px-CX)/(q.pscale*R),ny=(q.py-CY)/(q.pscale*R),nz=q.pz/R;
    let sh=nx*LIGHT.x+ny*LIGHT.y+nz*LIGHT.z;
    sh=Math.max(0,Math.min(1,sh));
    const s=1.7*q.pscale;
    ctx.globalAlpha=0.5+sh*0.45;
    ctx.fillStyle=LAND_RAMP[d.t][Math.min(7,(sh*8)|0)];
    ctx.fillRect(q.px-s/2,q.py-s/2,s,s);
  }
  ctx.globalAlpha=1;
}

/* ─── float travel: a just-said conversation flies from your hands to its place on Earth ─── */
function applyLaunches(now){
  for(const p of S.nodes.values()){const L=p.launch;if(!L)continue;
    const k=(now-L.t0)/L.dur;
    if(k>=1){delete p.launch;continue;}
    const e=k<.5?4*k*k*k:1-Math.pow(-2*k+2,3)/2;
    const tx=p.px,ty=p.py;
    const mx=(L.sx+tx)/2,my=Math.min(L.sy,ty)-140;
    p.px=(1-e)*(1-e)*L.sx+2*(1-e)*e*mx+e*e*tx;
    p.py=(1-e)*(1-e)*L.sy+2*(1-e)*e*my+e*e*ty;
    p.pz=-R;p.pscale=1;
  }
}

function drawHome(){
  const q={};projectXYZ(q,HOME_DIR.x*R,HOME_DIR.y*R,HOME_DIR.z*R);
  if(q.pz>0)return;
  const depth=1-Math.min(1,Math.max(0,(q.pz+R)/(2*R)));
  ctx.save();
  ctx.globalAlpha=0.6*depth;ctx.fillStyle='#E60000';
  ctx.beginPath();ctx.arc(q.px,q.py,2,0,7);ctx.fill();
  ctx.globalAlpha=0.75*depth;ctx.font='7px "Space Mono",ui-monospace,monospace';
  ctx.fillStyle='#EAF1F7';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('IIT MANDI',q.px+7,q.py+1);
  ctx.restore();
}

/* ─── you: white presence node at the user's location; hairline threads to your conversations ─── */
const YOU={px:0,py:0,pz:1,ok:false};
function youDir(){const g=S.geo;return g?latLonDir(g.lat,g.lon):latLonDir(33.7,78.9);}
function drawYouEdges(){
  if(IS_DEMO||intro.active){YOU.ok=false;return;}
  const d=youDir(),q={};projectXYZ(q,d.x*R*1.01,d.y*R*1.01,d.z*R*1.01);
  YOU.px=q.px;YOU.py=q.py;YOU.pz=q.pz;YOU.ok=q.pz<0;
  if(!YOU.ok||!S.mine.size)return;
  ctx.strokeStyle='rgba(0,0,0,0.13)';ctx.lineWidth=0.7;
  for(const id of S.mine){const n=S.nodes.get(id);if(!n||n.pz>0)continue;
    ctx.beginPath();ctx.moveTo(YOU.px,YOU.py);ctx.lineTo(n.px,n.py);ctx.stroke();}
}
function drawYouNode(now){
  if(!YOU.ok)return;
  const depth=1-Math.min(1,Math.max(0,(YOU.pz+R)/(2*R)));
  const pulse=1+0.12*Math.sin(now*0.0025);
  ctx.save();
  ctx.globalAlpha=0.95*Math.max(0.5,depth);
  ctx.fillStyle='#FFFFFF';ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.arc(YOU.px,YOU.py,5.5,0,7);ctx.fill();ctx.stroke();
  ctx.globalAlpha=0.55*Math.max(0.4,depth);ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(YOU.px,YOU.py,9*pulse,0,7);ctx.stroke();
  ctx.globalAlpha=0.8*Math.max(0.4,depth);ctx.font='7px "Space Mono",ui-monospace,monospace';
  ctx.fillStyle='#EAF1F7';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText('YOU',YOU.px+13,YOU.py+1);
  ctx.restore();
}

const nqEl=$('#nq');
function drawMassive(){
  // point-cloud pass: front hemisphere only, unsorted, square dots batched by category color
  for(const p of S.arr){
    if(p.pz>R*0.05)continue;
    const dim=S.filter&&S.filter!==p.cat;
    const depth=1-Math.min(1,Math.max(0,(p.pz+R)/(2*R)));
    const rad=nodeR(p)*p.pscale*(0.5+depth*0.6);
    const [r,g,b]=p.col;
    ctx.globalAlpha=(0.32+depth*0.68)*(dim?0.08:1);
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.fillRect(p.px-rad,p.py-rad,rad*2,rad*2);
  }
  ctx.globalAlpha=1;
  if(hover){
    const p=hover,[r,g,b]=p.col;
    ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=1.6;
    ctx.beginPath();ctx.arc(p.px,p.py,6,0,7);ctx.stroke();
  }
}
function drawFull(now){
  if(!IS_DEMO)for(const p of S.arr){if(p.incoming&&p.ppx){const [r,g,b]=p.col;
    const g2=ctx.createLinearGradient(p.ppx,p.ppy,p.px,p.py);
    g2.addColorStop(0,`rgba(${r},${g},${b},0)`);g2.addColorStop(1,`rgba(${r},${g},${b},0.5)`);
    ctx.strokeStyle=g2;ctx.lineWidth=2*p.pscale;
    ctx.beginPath();ctx.moveTo(p.ppx,p.ppy);ctx.lineTo(p.px,p.py);ctx.stroke();}
    p.ppx=p.px;p.ppy=p.py;}

  const order=S.arr.slice().sort((a,b)=>a.pz-b.pz);
  for(const p of order){
    const [r,g,b]=p.col;
    const dim=S.filter&&S.filter!==p.cat;
    const depth=1-Math.min(1,Math.max(0,(p.pz+R)/(2*R)));
    const t=p.born?Math.min(1,(now-p.born)/650):1, grow=1-Math.pow(1-t,3);
    const nr=IS_DEMO?p.nr:(S.replies.get(p.id)||[]).length;
    const rad=nodeR(p)*p.pscale*grow*(0.7+depth*0.4);
    const a=(0.5+depth*0.5)*(dim?0.15:1);

    if(!p.launch&&p.pz>R*0.15)continue;
    if(!p.launch&&p.pz>-R*0.02){
      ctx.globalAlpha=a*0.25;ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.beginPath();ctx.arc(p.px,p.py,Math.max(1.2,rad*0.4),0,7);ctx.fill();
      ctx.globalAlpha=1;continue;
    }

    if(!dim&&!p.launch&&depth>0.25){
      const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)+1e-6;
      const q2={};projectXYZ(q2,p.x/len*R,p.y/len*R,p.z/len*R);
      if(q2.pz<0){
        ctx.globalAlpha=a*0.5;
        ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=0.7;
        ctx.beginPath();ctx.moveTo(q2.px,q2.py);ctx.lineTo(p.px,p.py);ctx.stroke();
        ctx.globalAlpha=a*0.95;
        ctx.fillStyle=`rgb(${r},${g},${b})`;
        ctx.beginPath();ctx.arc(q2.px,q2.py,2.2,0,7);ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(q2.px,q2.py,2.2,0,7);ctx.stroke();
        ctx.globalAlpha=1;
      }
    }

    if(!dim&&!IS_STATIC){ctx.globalAlpha=a*(nr?0.18:0.09);ctx.fillStyle=`rgb(${r},${g},${b})`;
      ctx.beginPath();ctx.arc(p.px,p.py,rad*2.1,0,7);ctx.fill();}
    ctx.globalAlpha=a;ctx.fillStyle='#FFFFFF';
    ctx.beginPath();ctx.arc(p.px,p.py,rad,0,7);ctx.fill();
    ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=Math.min(2,Math.max(1.2,rad*0.28));ctx.stroke();
    ctx.globalAlpha=1;

    const na=IS_DEMO?p.na:(nr?repliesOf(p.id).filter(x=>x.kind==='answer').length:0);
    if(na>0&&!dim&&depth>0.25){
      const arcLen=Math.min(Math.PI*2,na*0.7);
      ctx.strokeStyle=`rgba(230,0,0,${0.55*depth})`;ctx.lineWidth=1.6*Math.min(p.pscale,1);
      ctx.beginPath();ctx.arc(p.px,p.py,rad+4,-Math.PI/2,-Math.PI/2+arcLen);ctx.stroke();
    }

    if(hover&&hover.id===p.id){
      ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.px,p.py,rad+5,0,7);ctx.stroke();}
  }
}
function drawSpot(now){
  if(!spot||hover)return;
  const p=spot.node;if(p.pz>0)return;
  const age=(now-spot.born)/1000;
  const pulse=1+0.25*Math.sin(age*4);
  const base=IS_MASSIVE?5:nodeR(p)*p.pscale+5;
  ctx.strokeStyle='rgba(230,0,0,0.75)';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.arc(p.px,p.py,base*pulse,0,7);ctx.stroke();
  ctx.strokeStyle='rgba(230,0,0,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(p.px,p.py,base*pulse+6,0,7);ctx.stroke();
}

function draw(){
  const now=performance.now();
  ctx.fillStyle=BGGRAD||'#EFF4F8';ctx.fillRect(0,0,W,H);
  if(intro.active){
    if(!intro.t0)intro.t0=now+250;
    const k=Math.min(1,Math.max(0,(now-intro.t0)/intro.dur));
    const e=1-Math.pow(1-k,3);
    rotY=HOME_ROTY-2.2*(1-e);
    rotX=0.95+(HOME_ROTX-0.95)*e;
    zoom=0.55+0.45*e;
    introAlpha=Math.min(1,k*1.9);
    if(k>=1)endIntro();
  }else if(!dragging){
    velY*=0.94;velX*=0.94;rotY+=velY;rotX+=velX;
    if(IS_DEMO){rotY+=spin;}
    else if(now-lastInteract>6000){
      if(!camTgt||labelFrame%90===0)camTgt=contentTarget();
      const ty=Math.atan2(camTgt.x,camTgt.z)+Math.PI;
      const tx=Math.asin(Math.max(-1,Math.min(1,-camTgt.y)));
      rotY+=Math.atan2(Math.sin(ty-rotY),Math.cos(ty-rotY))*0.006+0.00025;
      rotX+=(tx-rotX)*0.006;
    }
    rotX=Math.max(-1.3,Math.min(1.3,rotX));
  }
  if(!IS_STATIC)physics();
  positionAll(now);
  applyLaunches(now);
  drawGlobeSkin();
  drawYouEdges();
  if(IS_MASSIVE)drawMassive();else drawFull(now);
  drawHome();
  drawYouNode(now);

  if(++labelFrame%90===1)rebuildLabels();
  drawLabels();
  if(!intro.active)updateSpot(now);
  drawSpot(now);
  updateCallout();
  if(introAlpha<1){ctx.fillStyle='rgba(238,244,249,'+(1-introAlpha)+')';ctx.fillRect(0,0,W,H);}
  nqEl.textContent=S.arr.length.toLocaleString('en-US');
  requestAnimationFrame(draw);
}

/* ─── live data: add / receive ─── */
function addNode(q,incoming){
  if(S.nodes.has(q.id))return;
  const n=makeNode(q.id,q.body,q.category,q.created_at,incoming,q.lat,q.lon);
  S.nodes.set(q.id,n);S.arr.push(n);
  R=computeR();
  for(const p of S.arr)p.targetR=R*ORBIT;
}

/* ─── sheets ─── */
const scrim=$('#scrim');
function openSheet(id){$(id).classList.add('open');scrim.classList.add('open')}
function closeAll(){document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('open'));
  scrim.classList.remove('open');S.openId=null;activeKind=null;}
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeAll);
scrim.onclick=closeAll;
addEventListener('keydown',e=>{if(e.key==='Escape')closeAll()});
$('#fab').onclick=()=>{closeAll();captureGeo();openSheet('#compose')};

/* ─── identity: post visible or anonymous; location: city-level, rounded, silent home fallback ─── */
const anonBtn=$('#anonBtn'), nameEl=$('#name');
function syncAnon(){
  anonBtn.classList.toggle('on',S.anon);
  anonBtn.textContent=S.anon?'anonymous':'visible';
  nameEl.disabled=S.anon;
  localStorage.setItem('dotbro_anon',S.anon?'1':'0');
}
anonBtn.onclick=()=>{S.anon=!S.anon;syncAnon();};
syncAnon();
function captureGeo(){
  if(S.geo||IS_DEMO||!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(
    p=>{S.geo={lat:Math.round(p.coords.latitude*10)/10,lon:Math.round(p.coords.longitude*10)/10};
      localStorage.setItem('dotbro_geo',JSON.stringify(S.geo));},
    ()=>{},{timeout:4000,maximumAge:600000});
}

const catsEl=$('#cats');
CATKEYS.forEach(k=>{const [r,g,b]=CATS[k].col;
  const c=document.createElement('button');c.className='chip';c.textContent=k;
  c.onclick=()=>{S.cat=k;[...catsEl.children].forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor=''});
    c.classList.add('on');c.style.background=`rgb(${r},${g},${b})`;c.style.borderColor=`rgb(${r},${g},${b})`};
  catsEl.appendChild(c);
  if(k===S.cat)setTimeout(()=>c.onclick(),0);});
$('#body').addEventListener('input',e=>$('#count').textContent=`${e.target.value.length} / 500`);
$('#post').onclick=async()=>{
  if(IS_DEMO){alert('demo data — read only. Remove ?n= from the URL to go live.');return}
  const name=S.anon?'anonymous':$('#name').value.trim(),body=$('#body').value.trim();
  if(name.length<1||body.length<3){alert(S.anon?'write what you want to say (3+ chars).':'add your name and what you want to say (3+ chars).');return}
  const btn=$('#post');btn.disabled=true;if(!S.anon)localStorage.setItem('dotbro_name',name);
  const loc=S.geo||{lat:31.8,lon:77.0};
  const {data,error}=await db.addQuestion(name,body,S.cat,loc.lat,loc.lon);btn.disabled=false;
  if(error){alert("couldn't start it — try again.");return}
  $('#body').value='';$('#count').textContent='0 / 500';
  if(data){S.mine.add(data.id);localStorage.setItem('dotbro_mine',JSON.stringify([...S.mine]));
    if(!S.q.has(data.id)){S.q.set(data.id,data);addNode(data,true);}
    const n=S.nodes.get(data.id);
    if(n)n.launch={sx:W/2,sy:H-60,t0:performance.now(),dur:1300};}
  closeAll();};

function renderQ(){
  const q=qOf(S.openId); if(!q) return;
  const [r,g,b]=CATS[q.category]?CATS[q.category].col:CATS.random.col;
  const rs=repliesOf(S.openId).slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const counts=kindCounts(S.openId);

  const actionsHtml=KIND_ORDER.map(k=>{
    const m=KIND_META[k];
    return `<div class="p-btn${activeKind===k?' active':''}" data-kind="${k}">
      <div class="p-icon">${m.icon}</div>
      <div class="pb-label">${m.label}</div>
      <div class="pb-count">${counts[k]}</div>
    </div>`;
  }).join('');

  const isMeet=activeKind==='meet';
  const anonHtml=`<label class="anonline"><input type="checkbox" id="pAnon"${S.anon?' checked':''}> stay anonymous</label>`;
  const composeHtml = activeKind ? (
    isMeet
    ? `<div class="p-input open"><input id="pText" type="text" maxlength="200" placeholder="${KIND_META.meet.placeholder}">${anonHtml}<button class="btn" id="pSubmit">Reach out →</button></div>`
    : `<div class="p-input open"><textarea id="pText" maxlength="500" placeholder="${KIND_META[activeKind].placeholder}"></textarea>${anonHtml}<button class="btn" id="pSubmit">Say it →</button></div>`
  ) : '';

  const repliesHtml = rs.length
    ? rs.map(x=>`<div class="r"><div class="rmeta"><span class="rk">${(KIND_META[x.kind]?KIND_META[x.kind].label:'continue').toUpperCase()}</span> · <b>${esc(x.name)}</b> · ${ago(x.created_at)}</div><div class="rbody">${esc(x.body)}</div></div>`).join('')
    : `<div class="r rmeta">no one has continued this yet — be the first.</div>`;

  $('#qview').innerHTML =
    `<div class="qcat" style="color:rgb(${r},${g},${b})">${esc(q.category)}</div>`+
    `<div class="qbody">${esc(q.body)}</div>`+
    `<div class="qmeta">${esc(q.name)} · ${ago(q.created_at)}${IS_DEMO?'':' · from '+fmtLoc(q.lat,q.lon)}</div>`+
    `<div class="p-actions" id="pActions">${actionsHtml}</div>`+
    composeHtml+
    `<div class="replies">${repliesHtml}</div>`;

  $('#pActions').querySelectorAll('.p-btn').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.kind;
      activeKind = (activeKind===k) ? null : k;
      renderQ();
      if(activeKind){ setTimeout(()=>{const el=$('#pText'); if(el) el.focus();},60); }
    };
  });
  const submitBtn=$('#pSubmit');
  if(submitBtn) submitBtn.onclick=submitAction;
  const textEl=$('#pText');
  if(textEl && isMeet) textEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitAction();}});
}

async function submitAction(){
  if(IS_DEMO){alert('demo data — read only. Remove ?n= from the URL to go live.');return}
  const id=S.openId; if(!id||!activeKind) return;
  const input=$('#pText'); const body=(input?input.value.trim():'');
  const isMeet=activeKind==='meet';
  const finalBody = body || (isMeet? 'wants to connect' : '');
  if(!isMeet && finalBody.length<1) return;
  const anonChk=$('#pAnon');
  const anon=anonChk?anonChk.checked:S.anon;
  const name=anon?'anonymous':(($('#name').value.trim())||localStorage.getItem('dotbro_name')||'anonymous');
  const btn=$('#pSubmit'); if(btn) btn.disabled=true;
  const {data,error}=await db.addReply(id,name,finalBody,activeKind);
  if(btn) btn.disabled=false;
  if(error){ alert('could not send — try again.'); return; }
  if(data) pushReply(data);
  activeKind=null;
  renderQ();
}

function openQ(id){closeAll();S.openId=id;activeKind=null;openSheet('#qsheet');renderQ();}

function pushReply(r){const arr=S.replies.get(r.question_id)||[];
  if(arr.some(x=>x.id===r.id))return;arr.push(r);
  arr.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  S.replies.set(r.question_id,arr);
  if(S.openId===r.question_id)renderQ();}

/* ─── boot ─── */
(async function(){
  const saved=localStorage.getItem('dotbro_name');if(saved)$('#name').value=saved;
  resize();
  if(IS_DEMO){
    generateDemo(DEMO_N);
    resize();
    draw();
    return;
  }
  const [{data:qs},{data:rs}]=await Promise.all([db.listQuestions(),db.listReplies()]);
  (rs||[]).forEach(r=>{const a=S.replies.get(r.question_id)||[];a.push(r);S.replies.set(r.question_id,a)});
  (qs||[]).slice().reverse().forEach(q=>{S.q.set(q.id,q);addNode(q,false)});
  db.onQuestion(q=>{if(!S.q.has(q.id)){S.q.set(q.id,q);addNode(q,true)}});
  db.onReply(pushReply);
  draw();
})();
</script>
