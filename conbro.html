<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
:root{
  --void:#FFFFFF;--ink:#F5F5F7;--paper:#1D1D1F;--dim:#86868B;
  --red:#E60000;--hair:rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--void);
  color:var(--paper);font-family:'IBM Plex Mono','SF Mono',ui-monospace,monospace;
  overflow:hidden;-webkit-font-smoothing:antialiased;}
canvas{display:block;width:100%;height:100%;position:fixed;inset:0;cursor:grab;touch-action:none;background:#FFFFFF;}
canvas:active{cursor:grabbing;}

/* ── HUD ── */
.hud{position:fixed;pointer-events:none;z-index:10;}
.topleft{top:0;left:0;padding:20px 24px;}
.brand{display:flex;align-items:center;gap:9px;}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--red);
  box-shadow:0 0 12px 2px rgba(230,0,0,0.35);}
.brand .wm{font-family:'Bebas Neue','Arial Narrow',sans-serif;font-size:24px;letter-spacing:1px;}
.sub{margin-top:6px;font-size:9.5px;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);}

.topright{top:0;right:0;padding:20px 24px;text-align:right;}
.algo-badge{display:inline-flex;align-items:center;gap:7px;font-size:9.5px;
  letter-spacing:0.12em;text-transform:uppercase;color:#3FC9A0;}
.algo-badge::before{content:"";width:5px;height:5px;border-radius:50%;background:#3FC9A0;
  animation:live 1.6s ease-in-out infinite;}
@keyframes live{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);}}

.botleft{bottom:0;left:0;padding:20px 24px;}
.legend{display:flex;flex-direction:column;gap:5px;}
.lg{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--dim);}
.lg .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

.botright{bottom:0;right:0;padding:20px 24px;text-align:right;}
.counts{font-size:10px;letter-spacing:.08em;color:var(--dim);line-height:1.8;}
.counts b{color:var(--paper);font-weight:600;font-size:14px;font-variant-numeric:tabular-nums;}
.hint{margin-top:10px;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(138,136,130,.45);}

/* ── the prompt — held near the dock, quiet but legible ── */
.prompt-wrap{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:12;
  pointer-events:none;text-align:center;width:min(560px,88vw);}
.prompt-wrap .pw-line{font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.5;
  color:#1D1D1F;letter-spacing:.01em;}
@media(max-width:640px){.prompt-wrap{bottom:88px;}.prompt-wrap .pw-line{font-size:11.5px;}}

/* ── tooltip (read-only — no reply, no answer) ── */
#tip{position:fixed;pointer-events:none;z-index:20;max-width:300px;padding:12px 15px;
  background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,0.1);border-radius:10px;
  box-shadow:0 8px 30px rgba(0,0,0,.12);opacity:0;transition:opacity .12s ease;
  transform:translate(-50%,calc(-100% - 18px));}
#tip .tt{font-size:8px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:4px;}
#tip .tq{font-size:12px;line-height:1.45;color:#1D1D1F;}
#tip .tm{margin-top:6px;font-size:8.5px;color:#86868B;letter-spacing:.04em;}

/* ── input dock ── */
.dock{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:15;
  width:min(560px,88vw);display:flex;}
.dock input{flex:1;padding:12px 16px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.1);
  border-right:none;border-radius:11px 0 0 11px;color:#1D1D1F;font-family:inherit;font-size:12px;
  outline:none;caret-color:var(--red);}
.dock input::placeholder{color:#86868B;}
.dock input:focus{border-color:rgba(230,0,0,.4);}
.dock button{padding:0 20px;background:#1D1D1F;color:#FFFFFF;border:none;
  border-radius:0 11px 11px 0;font-family:inherit;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;cursor:pointer;}
.dock button:hover{background:var(--red);}
.dock button:disabled{opacity:.5;cursor:not-allowed;}

@media(max-width:640px){
  .botleft{display:none;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div class="hud topleft">
  <a href="/" style="text-decoration:none;color:inherit;pointer-events:auto;display:inline-block">
    <div class="brand"><span class="dot"></span><span class="wm">con.BRO</span></div>
  </a>
  <div class="sub">Unfinished Conversations</div>
  <div style="pointer-events:auto;margin-top:9px;display:flex;gap:12px;">
    <a href="/parbro.html" style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);text-decoration:none;">par.BRO</a>
    <a href="/podbro.html" style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#FF7A1A;text-decoration:none;">pod.BRO</a>
  </div>
</div>
<div class="hud topright">
  <span class="algo-badge">Live</span>
</div>
<div class="hud botleft">
  <div class="legend" id="legendBox"></div>
</div>
<div class="hud botright">
  <div class="counts"><b id="nCount">0</b> unfinished conversations named</div>
  <div class="hint">hover to read · drag to spin · scroll to zoom</div>
</div>

<div class="prompt-wrap"><div class="pw-line">What conversation do you wish had happened or continued?</div></div>

<!-- Tooltip -->
<div id="tip"><div class="tt"></div><div class="tq"></div><div class="tm"></div></div>

<!-- Name it dock -->
<div class="dock">
  <input id="qin" type="text" maxlength="500" placeholder="Name it — no login, nothing traced back to you" aria-label="Name your unfinished conversation">
  <button id="qadd">Name it</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const tip=document.getElementById('tip');

/* ─── data layer ─── */
const SUPABASE_URL='https://fliheqjbwmcoggajovln.supabase.co';
const SUPABASE_KEY='sb_publishable_qaGLnY9bUZ3nhveVw-64xg_kDuJLfHt';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const db={
  list:()=>sb.from('conbro_conversations').select('*').order('created_at',{ascending:false}).limit(300),
  add:(body,topic)=>sb.from('conbro_conversations').insert({body,topic}).select().single(),
  onInsert:cb=>sb.channel('conv').on('postgres_changes',{event:'INSERT',schema:'public',table:'conbro_conversations'},p=>cb(p.new)).subscribe(),
};

let W,H,DPR,CX,CY,R;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  canvas.width=W*DPR; canvas.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  CX=W/2; CY=H*0.44; R=Math.min(W,H)*0.28;
}
addEventListener('resize',resize); resize();

// ══ TOPIC CATEGORIES — keyword-detected, each gets a hue (no AI, just counting) ══
const TOPICS = [
  { key:'learning', name:'Learning', hue:210, keywords:['learn','study','research','professor','lecture','course','knowledge','understand','teach','education','class','seminar','read','book'] },
  { key:'people',   name:'People',   hue:150, keywords:['meet','friend','person','someone','collaborate','team','co-founder','partner','mentor','network','connect','people','relationship','trust'] },
  { key:'career',   name:'Career',   hue:35,  keywords:['build','startup','career','job','funding','business','company','hire','work','intern','project','product','launch','founder','money'] },
  { key:'self',     name:'Self',     hue:280, keywords:['curious','afraid','shy','quiet','feel','think','believe','life','meaning','purpose','identity','dream','fear','hope','lost','wish'] },
  { key:'ideas',    name:'Ideas',    hue:170, keywords:['idea','create','design','solve','innovation','experiment','prototype','hack','invent','discover','imagine','theory','hypothesis'] },
  { key:'society',  name:'Society',  hue:350, keywords:['community','culture','politics','change','impact','world','justice','equality','debate','opinion','voice','rights','system','government'] },
];
const TOPIC_BY_KEY={}; TOPICS.forEach(t=>TOPIC_BY_KEY[t.key]=t);

// build legend — topics only. No answered/unanswered/online states exist here.
const legendBox=document.getElementById('legendBox');
TOPICS.forEach(t=>{
  const d=document.createElement('div'); d.className='lg';
  d.innerHTML=`<span class="sw" style="background:hsl(${t.hue},75%,55%)"></span>${t.name}`;
  legendBox.appendChild(d);
});

function detectTopic(text){
  const lower=text.toLowerCase();
  let best=null, bestCount=0;
  for(const t of TOPICS){
    let c=0; for(const k of t.keywords) if(lower.includes(k)) c++;
    if(c>bestCount){ bestCount=c; best=t; }
  }
  return best || TOPICS[(Math.random()*TOPICS.length)|0];
}

// ── fixed topic anchors on the sphere (Fibonacci spread — deterministic, no seed nodes needed) ──
const GOLDEN=Math.PI*(3-Math.sqrt(5));
const TOPIC_ANCHOR={};
TOPICS.forEach((t,i)=>{
  const y=1-(i/(TOPICS.length-1))*2, rad=Math.sqrt(Math.max(0,1-y*y)), th=GOLDEN*i;
  TOPIC_ANCHOR[t.key]={x:Math.cos(th)*rad, y, z:Math.sin(th)*rad};
});

let nodes=[];
function randDir(){ const u=Math.random()*2-1, th=Math.random()*Math.PI*2, s=Math.sqrt(1-u*u);
  return {x:s*Math.cos(th), y:u, z:s*Math.sin(th)}; }

function makeNode(id,text,topicKey,createdAt,incoming){
  const topic=TOPIC_BY_KEY[topicKey]||TOPICS[0];
  const anchor=TOPIC_ANCHOR[topic.key];
  const jitter=randDir();
  const startR=incoming?R*3.2:R*(0.85+Math.random()*0.3);
  return {
    id, text, topic,
    x:(anchor.x*0.7+jitter.x*0.3)*startR, y:(anchor.y*0.7+jitter.y*0.3)*startR, z:(anchor.z*0.7+jitter.z*0.3)*startR,
    vx:0,vy:0,vz:0, fx:0,fy:0,fz:0,
    curR:startR, targetR:R,
    r: 4.5+Math.random()*2,
    born:performance.now(), createdAt: createdAt||new Date().toISOString(),
    px:0,py:0,pz:0,pscale:1, ppx:0,ppy:0, incoming:!!incoming,
    pulse:0,
  };
}

// ── rotation state ──
let rotY=0.5,rotX=-0.18,spin=0.0014,velY=0,velX=0,dragging=false,lx=0,ly=0,zoom=1,hover=null;

// ── physics: mutual repulsion + gentle pull toward the node's topic anchor ──
function physics(){
  const n=nodes.length;
  for(let i=0;i<n;i++){const p=nodes[i];p.fx=0;p.fy=0;p.fz=0;}
  const REP=560;
  for(let i=0;i<n;i++){const a=nodes[i];for(let j=i+1;j<n;j++){const b=nodes[j];
    let dx=a.x-b.x,dy=a.y-b.y,dz=a.z-b.z,d2=dx*dx+dy*dy+dz*dz+.01;
    const d=Math.sqrt(d2),f=REP/d2;
    const fx=dx/d*f,fy=dy/d*f,fz=dz/d*f;
    a.fx+=fx;a.fy+=fy;a.fz+=fz;b.fx-=fx;b.fy-=fy;b.fz-=fz;}}
  for(let i=0;i<n;i++){const p=nodes[i];
    const anc=TOPIC_ANCHOR[p.topic.key];
    p.fx+=(anc.x*R-p.x)*0.012; p.fy+=(anc.y*R-p.y)*0.012; p.fz+=(anc.z*R-p.z)*0.012;
    p.vx=(p.vx+p.fx)*0.86;p.vy=(p.vy+p.fy)*0.86;p.vz=(p.vz+p.fz)*0.86;
    p.x+=p.vx*0.08;p.y+=p.vy*0.08;p.z+=p.vz*0.08;
    if(p.curR>p.targetR+.5)p.curR+=(p.targetR-p.curR)*0.045;
    else{p.curR=p.targetR;p.incoming=false;}
    const len=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z)+1e-6;
    p.x+=(p.x/len*p.curR-p.x)*0.22;p.y+=(p.y/len*p.curR-p.y)*0.22;p.z+=(p.z/len*p.curR-p.z)*0.22;
    if(p.pulse>0)p.pulse-=0.02;}
}

function project(p){
  const cY=Math.cos(rotY),sY=Math.sin(rotY),cX=Math.cos(rotX),sX=Math.sin(rotX);
  let x=p.x*cY-p.z*sY,z=p.x*sY+p.z*cY,y=p.y*cX-z*sX;z=p.y*sX+z*cX;
  const fov=900*zoom,scale=fov/(fov+z+R*1.4);
  p.px=CX+x*scale;p.py=CY+y*scale;p.pz=z;p.pscale=scale;
}

function nodeColor(n){ return {h:n.topic.hue, s:70, l:52}; }

const ago=ts=>{const s=Math.floor((Date.now()-new Date(ts))/1e3);if(s<60)return'just now';
  const m=s/60|0;if(m<60)return m+'m ago';const h=m/60|0;return h<24?h+'h ago':(h/24|0)+'d ago'};

// ── input: hover to read, click to acknowledge (a quiet pulse — never a reply) ──
canvas.addEventListener('pointerdown',e=>{dragging=true;lx=e.clientX;ly=e.clientY;
  try{canvas.setPointerCapture(e.pointerId);}catch(_){}});
canvas.addEventListener('pointerup',e=>{
  if(!dragging) return; dragging=false;
  const dx=e.clientX-lx,dy=e.clientY-ly;
  if(Math.abs(dx)+Math.abs(dy)<6 && hover){ hover.pulse=1; }
});
canvas.addEventListener('pointermove',e=>{
  if(dragging){const dx=e.clientX-lx,dy=e.clientY-ly;
    rotY+=dx*0.006;rotX+=dy*0.006;rotX=Math.max(-1.3,Math.min(1.3,rotX));
    velY=dx*0.0006;velX=dy*0.0006;lx=e.clientX;ly=e.clientY;}
  let best=null,bd=24*24;
  for(const p of nodes){if(p.pz>R*0.85)continue;
    const dx=e.clientX-p.px,dy=e.clientY-p.py,d2=dx*dx+dy*dy;
    if(d2<bd){bd=d2;best=p;}}
  hover=best;
  if(best){
    const c=nodeColor(best);
    const sameTopic=nodes.filter(n=>n.topic.key===best.topic.key).length;
    tip.querySelector('.tt').style.color=`hsl(${c.h},${c.s}%,${c.l}%)`;
    tip.querySelector('.tt').textContent=best.topic.name.toUpperCase();
    tip.querySelector('.tq').textContent=best.text;
    tip.querySelector('.tm').textContent=ago(best.createdAt)+' · '+sameTopic+(sameTopic===1?' person':' people')+' named something in '+best.topic.name.toLowerCase();
    tip.style.left=best.px+'px';tip.style.top=best.py+'px';tip.style.opacity='1';
    canvas.style.cursor='pointer';
  } else {tip.style.opacity='0';if(!dragging)canvas.style.cursor='grab';}
});
canvas.addEventListener('pointerleave',()=>{tip.style.opacity='0';hover=null;});
canvas.addEventListener('wheel',e=>{e.preventDefault();zoom=Math.max(0.5,Math.min(2.4,zoom-e.deltaY*0.001));},{passive:false});

// ── globe skin ──
function drawGlobeSkin(){
  ctx.strokeStyle='rgba(0,0,0,0.07)';ctx.lineWidth=.8;
  const seg=48,q={};
  for(let k=-2;k<=2;k++){const lat=k*0.42,rr=Math.cos(lat)*R,yy=Math.sin(lat)*R;ctx.beginPath();
    for(let s=0;s<=seg;s++){const th=s/seg*Math.PI*2;q.x=Math.cos(th)*rr;q.y=yy;q.z=Math.sin(th)*rr;
      project(q);if(s===0)ctx.moveTo(q.px,q.py);else ctx.lineTo(q.px,q.py);}ctx.stroke();}
  for(let k=0;k<3;k++){const lon=k*Math.PI/3;ctx.beginPath();
    for(let s=0;s<=seg;s++){const ph=s/seg*Math.PI*2;q.x=Math.cos(lon)*Math.cos(ph)*R;q.y=Math.sin(ph)*R;
      q.z=Math.sin(lon)*Math.cos(ph)*R;project(q);if(s===0)ctx.moveTo(q.px,q.py);else ctx.lineTo(q.px,q.py);}ctx.stroke();}
}

// ── render ──
const nCountEl=document.getElementById('nCount');
function draw(){
  ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,W,H);
  if(!dragging){rotY+=spin+velY;rotX+=velX;velY*=0.94;velX*=0.94;rotX=Math.max(-1.3,Math.min(1.3,rotX));}
  physics(); for(const p of nodes) project(p);
  drawGlobeSkin();

  // comet trails for newly-arrived nodes (a real submission just landed)
  for(const p of nodes){if(p.incoming&&p.ppx){const c=nodeColor(p);
    const g=ctx.createLinearGradient(p.ppx,p.ppy,p.px,p.py);
    g.addColorStop(0,`hsla(${c.h},${c.s}%,${c.l}%,0)`);
    g.addColorStop(1,`hsla(${c.h},${c.s}%,${c.l}%,0.5)`);
    ctx.strokeStyle=g;ctx.lineWidth=2*p.pscale;
    ctx.beginPath();ctx.moveTo(p.ppx,p.ppy);ctx.lineTo(p.px,p.py);ctx.stroke();}
    p.ppx=p.px;p.ppy=p.py;}

  // nodes back→front
  const order=nodes.slice().sort((a,b)=>a.pz-b.pz);
  const now=performance.now();
  for(const p of order){
    const c=nodeColor(p);
    const depth=1-Math.min(1,Math.max(0,(p.pz+R)/(2*R)));
    const grow=Math.min(1,(now-p.born)/600);
    const rad=p.r*p.pscale*grow*(0.55+depth*0.55);
    const a=0.2+depth*0.8;

    ctx.globalAlpha=a*0.15;
    ctx.fillStyle=`hsl(${c.h},${c.s}%,${c.l}%)`;
    ctx.beginPath();ctx.arc(p.px,p.py,rad*2,0,7);ctx.fill();
    ctx.globalAlpha=a;
    ctx.beginPath();ctx.arc(p.px,p.py,rad,0,7);ctx.fill();
    ctx.globalAlpha=1;

    // acknowledge-pulse — a quiet ring on click, never a reply
    if(p.pulse>0){
      ctx.strokeStyle=`hsla(${c.h},${c.s}%,${c.l}%,${p.pulse*0.6*depth})`;
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.px,p.py,rad+6+(1-p.pulse)*14,0,7);ctx.stroke();
    }

    if(hover&&hover.id===p.id){
      ctx.strokeStyle=`hsl(${c.h},${c.s}%,${c.l}%)`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.px,p.py,rad+5,0,7);ctx.stroke();}

    // circulating text — the conversation itself IS the node's identity
    if(depth > 0.35 && rad > 2.5 && !p.incoming){
      const orbitR = rad + 14 * p.pscale;
      const textAngle = now * 0.0004 * (1 + p.id * 0.03) + p.id * 1.7;
      const tx = p.px + Math.cos(textAngle) * orbitR;
      const ty = p.py + Math.sin(textAngle) * orbitR;
      const maxChars = 30;
      let label = p.text.length > maxChars ? p.text.slice(0, maxChars-1) + '…' : p.text;
      const textA = 0.4 + depth * 0.5;

      ctx.save();
      ctx.globalAlpha = textA;
      ctx.font = `400 ${Math.max(8, Math.round(10 * p.pscale))}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = `hsl(${c.h},${Math.max(20,c.s-30)}%,${Math.min(70,c.l+18)}%)`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, tx, ty);
      ctx.restore();
    }
  }

  nCountEl.textContent=nodes.length;
  requestAnimationFrame(draw);
}

// ── name it (real persistence — anonymous, ask-only) ──
let nextId=0;
function addLocalNode(row,incoming){
  if(nodes.some(n=>n.id===row.id))return;
  const n=makeNode(row.id,row.body,row.topic,row.created_at,incoming);
  nodes.push(n);
  if(nodes.length>400){
    const oldest=nodes.reduce((m,x)=>x.createdAt<m.createdAt?x:m);
    nodes=nodes.filter(x=>x!==oldest);
  }
}
const qin=document.getElementById('qin'),qadd=document.getElementById('qadd');
async function submit(){
  const v=qin.value.trim();
  if(v.length<3)return;
  qadd.disabled=true;
  const topic=detectTopic(v);
  const {data,error}=await db.add(v,topic.key);
  qadd.disabled=false;
  if(error){ alert('could not name that — try again.'); return; }
  qin.value='';
  addLocalNode(data,true);
}
qadd.addEventListener('click',submit);
qin.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

// ── boot: load real conversations, then subscribe to real new ones ──
(async function(){
  resize();
  const {data}=await db.list();
  (data||[]).slice().reverse().forEach(row=>addLocalNode(row,false));
  db.onInsert(row=>addLocalNode(row,true));
  draw();
})();
</script>
</body>
</html>
